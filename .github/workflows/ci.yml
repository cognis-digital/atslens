name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-test CLI
        run: |
          atslens layouts
          atslens validate examples/records.json
          atslens map examples/records.json --to vendorA
          atslens export examples/records.json --format csv
          # diff a record set against itself: must report CLEAN (exit 0)
          atslens diff examples/records.json examples/records.json
          # a couple of demos end-to-end
          atslens map demos/01-greenhouse-style-export/vendora_export.json \
            --from vendorA --to canonical
          atslens validate demos/05-normalize-messy-intake/messy_intake.json \
            --normalize
